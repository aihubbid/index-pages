name: index-pages Validate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/validate-site.yml"
      - "index.html"
      - "download.html"
      - "css/**"
      - "js/**"
      - "images/**"
      - "fonts/**"
      - "data/**"
      - "CNAME"
      - ".nojekyll"
  pull_request:
    paths:
      - ".github/workflows/validate-site.yml"
      - "index.html"
      - "download.html"
      - "css/**"
      - "js/**"
      - "images/**"
      - "fonts/**"
      - "data/**"
      - "CNAME"
      - ".nojekyll"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.2

      - name: Validate static assets
        shell: bash
        run: |
          set -euo pipefail
          test -s CNAME
          node --check js/aihub-site.js
          node - <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const downloads = JSON.parse(fs.readFileSync('data/downloads.json', 'utf8'));
          if (downloads.schemaVersion !== 'aihub-downloads.v1') {
            throw new Error('data/downloads.json schemaVersion must be aihub-downloads.v1');
          }
          if (!Array.isArray(downloads.products) || downloads.products.length === 0) {
            throw new Error('data/downloads.json products must be a non-empty array');
          }
          function scan(value, label) {
            if (!value || typeof value !== 'object') return;
            if (Array.isArray(value)) return value.forEach((item, index) => scan(item, `${label}[${index}]`));
            for (const [key, child] of Object.entries(value)) {
              if (key === 'url') throw new Error(`${label} must not contain url`);
              scan(child, `${label}.${key}`);
            }
          }
          for (const file of fs.readdirSync('data').filter((entry) => entry.endsWith('.json'))) {
            scan(JSON.parse(fs.readFileSync(path.join('data', file), 'utf8')), `data/${file}`);
          }
          NODE

      - name: HTTP smoke test
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 4173 >/tmp/index-pages-http.log 2>&1 &
          server_pid=$!
          trap 'kill "${server_pid}" >/dev/null 2>&1 || true' EXIT
          sleep 2
          curl -fsS http://127.0.0.1:4173/ >/dev/null
          curl -fsS http://127.0.0.1:4173/download.html >/dev/null
          curl -fsS http://127.0.0.1:4173/js/aihub-site.js >/dev/null
          curl -fsS http://127.0.0.1:4173/css/aihub.css >/dev/null
          curl -fsS http://127.0.0.1:4173/data/downloads.json >/dev/null
